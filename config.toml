[alpaca]
feed = "sip"
base_url = "https://data.alpaca.markets"
stock_ws_url = "wss://stream.data.alpaca.markets/v2/sip"
options_ws_url = "wss://stream.data.alpaca.markets/v1beta1/opra"
trading_base_url = "https://api.alpaca.markets"

[public_com]
poll_interval = 2.0
portfolio_refresh = 30.0

[risk]
max_position_size = 1000.0
max_position_concentration = 0.10
max_order_value = 50000.0
daily_loss_limit = -5000.0
max_open_orders = 20
max_daily_trades = 100
max_portfolio_drawdown = 0.15
allowed_symbols = []
blocked_symbols = []

[dashboard]
host = "0.0.0.0"
port = 8080

[platform]
log_level = "INFO"
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
