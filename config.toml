[data]
ingestion_enabled = true
csv_directory = ""
replay_speed = 0.0
max_bars_per_request = 10000

[public_com]
poll_interval = 2.0
portfolio_refresh = 30.0

[risk]
max_position_size = 1000.0
max_position_concentration = 0.10
max_order_value = 50000.0
daily_loss_limit = -5000.0
max_open_orders = 20
max_daily_trades = 100
max_portfolio_drawdown = 0.15
allowed_symbols = []
blocked_symbols = []

[risk.greeks]
max_portfolio_delta = 500.0
max_portfolio_gamma = 100.0
max_daily_theta = -200.0
max_portfolio_vega = 1000.0
greeks_refresh_interval_seconds = 30

[crypto]
trading_pairs = ["BTC-USD", "ETH-USD"]
poll_interval = 2.0
portfolio_refresh = 30.0

[options]
poll_interval = 2.0
portfolio_refresh = 30.0

[options.expiration]
auto_close_dte = 1
alert_dte = 7
roll_enabled = false
roll_target_dte = 30
check_interval_seconds = 60

[performance]
message_queue_size = 50000
message_queue_mode = "lossy"
consumer_batch_size = 100
consumer_flush_interval_ms = 10
dedup_quotes_in_batch = true
default_serialization = "json"
lazy_deserialize = true

[dashboard]
host = "0.0.0.0"
port = 8080
update_interval_ms = 100
max_trades_per_flush = 50

[platform]
log_level = "INFO"
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
